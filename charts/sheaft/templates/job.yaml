{{- if eq .Values.mode "batch" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sheaft.fullname" . }}
  labels:
    {{- include "sheaft.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.batch.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.batch.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "sheaft.selectorLabels" . | nindent 8 }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sheaft
          image: {{ include "sheaft.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - run
            - --model
            - {{ .Values.paths.model | quote }}
            {{- if .Values.batch.useAnalysis }}
            - --analysis
            - {{ .Values.paths.analysis | quote }}
            {{- else }}
            - --policy
            - {{ .Values.paths.policy | quote }}
            {{- end }}
            - --out-dir
            - {{ .Values.paths.outputDir | quote }}
            - --seed
            - {{ printf "%v" .Values.batch.seed | quote }}
            {{- range .Values.batch.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: artifacts
              mountPath: {{ .Values.paths.artifact | quote }}
            - name: output
              mountPath: {{ .Values.paths.outputDir | quote }}
            {{- if or .Values.config.existingConfigMap (include "sheaft.hasInlineConfig" .) }}
            - name: config
              mountPath: {{ .Values.paths.configDir | quote }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: artifacts
{{ include "sheaft.volumeSource" (dict "volume" .Values.storage.artifact) | indent 10 }}
        - name: output
{{ include "sheaft.volumeSource" (dict "volume" .Values.storage.output) | indent 10 }}
        {{- if or .Values.config.existingConfigMap (include "sheaft.hasInlineConfig" .) }}
        - name: config
          configMap:
            name: {{ include "sheaft.configMapName" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
