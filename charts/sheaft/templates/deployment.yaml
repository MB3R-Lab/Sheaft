{{- if eq .Values.mode "serve" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sheaft.fullname" . }}
  labels:
    {{- include "sheaft.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "sheaft.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sheaft.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if and .Values.metrics.enabled .Values.service.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: {{ .Values.service.port | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sheaft
          image: {{ include "sheaft.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            {{- if .Values.serve.useConfigFile }}
            - --config
            - {{ .Values.paths.serveConfig | quote }}
            {{- else }}
            - --artifact
            - {{ .Values.paths.artifact | quote }}
            - --artifact-mode
            - {{ .Values.serve.artifactMode | quote }}
            {{- if .Values.serve.useAnalysis }}
            - --analysis
            - {{ .Values.paths.analysis | quote }}
            {{- else }}
            - --policy
            - {{ .Values.paths.policy | quote }}
            {{- end }}
            - --listen
            - {{ .Values.serve.listen | quote }}
            - --poll-interval
            - {{ .Values.serve.pollInterval | quote }}
            - --history-dir
            - {{ .Values.paths.historyDir | quote }}
            {{- end }}
            {{- range .Values.serve.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: artifacts
              mountPath: {{ .Values.paths.artifact | quote }}
            - name: output
              mountPath: {{ .Values.paths.outputDir | quote }}
            - name: history
              mountPath: {{ .Values.paths.historyDir | quote }}
            {{- if or .Values.config.existingConfigMap (include "sheaft.hasInlineConfig" .) }}
            - name: config
              mountPath: {{ .Values.paths.configDir | quote }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: artifacts
{{ include "sheaft.volumeSource" (dict "volume" .Values.storage.artifact) | indent 10 }}
        - name: output
{{ include "sheaft.volumeSource" (dict "volume" .Values.storage.output) | indent 10 }}
        - name: history
{{ include "sheaft.volumeSource" (dict "volume" .Values.storage.history) | indent 10 }}
        {{- if or .Values.config.existingConfigMap (include "sheaft.hasInlineConfig" .) }}
        - name: config
          configMap:
            name: {{ include "sheaft.configMapName" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
