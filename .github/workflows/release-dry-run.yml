name: release-dry-run

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate-release-surface:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Smoke checked-in examples
        run: make smoke-examples

      - name: Validate release dry-run
        run: |
          OWNER_LC="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          make release-dry-run APP_VERSION=0.0.0-dev IMAGE_REPOSITORY=ghcr.io/${OWNER_LC}/sheaft

      - name: Validate default config pack generation
        run: sh scripts/ci/check-default-config-pack.sh

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sheaft-release-dry-run
          path: |
            dist/**
            compatibility-manifest.json
            release-manifest.json
            charts/sheaft/**
            .tmp/smoke-examples/**
          if-no-files-found: error
